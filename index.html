<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Tech AI | Image to Line Art</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 2px solid #00f2ff; }
        #canvas { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
        input { margin: 20px 0; }
        .btn { background: #00f2ff; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>گۆهۆڕینا وێنەی بۆ Line Art</h2>
    <input type="file" id="upload" accept="image/*">
    <br>
    <canvas id="canvas"></canvas>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.style.display = 'block';
                
                // کێشانا وێنەی
                ctx.drawImage(img, 0, 0);
                
                // لێرە فلتەرێ Line Art جێبەجێ دکەین
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // مەنتیقێ سادە بۆ هێلان (Edge Detection)
                for (let i = 0; i < data.length; i += 4) {
                    let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    // ئەگەر ڕەنگ یێ نێزیکی سپی بیت، ب تمامى سپی بکە، ئەگەر تاریک بیت ڕەش بکە
                    let color = avg > 120 ? 255 : 0; 
                    data[i] = data[i+1] = data[i+2] = color;
                }
                
                ctx.putImageData(imageData, 0, 0);
                // تێبینی: ئەڤە فلتەرەکێ زۆر سادەیە، بۆ کارەکێ پیشەیی پێدڤی ب OpenCV هەیە
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
