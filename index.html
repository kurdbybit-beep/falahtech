<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech AI | Office Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-image: url('https://i.ibb.co/vC2BLwm2/image.jpg');
            --overlay: rgba(0, 0, 0, 0.5);
            --brand-glow: rgba(0, 242, 255, 0.8);
        }

        [data-theme="light"] {
            --overlay: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(var(--overlay), var(--overlay)), var(--bg-image);
            background-size: cover;
            background-position: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- Spinner Container --- */
        .spinner-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center Circle with Tech AI */
        .brand-center {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 900;
            z-index: 30;
            width: 110px;
            height: 110px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 3px solid var(--brand-glow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 30px var(--brand-glow);
            position: absolute;
            text-transform: uppercase;
        }

        /* Rotating Arms (4 Arms) */
        .fidget-blades {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: fastSpin 10s linear infinite;
        }

        @keyframes fastSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .blade-arm {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 140px; /* Distance of icons */
            background: linear-gradient(to bottom, var(--brand-glow), transparent);
            transform-origin: top center;
        }

        .icon-link {
            position: absolute;
            bottom: -35px;
            left: -33px;
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            animation: counterRotate 10s linear infinite;
            transition: 0.3s;
        }

        .icon-link:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px white;
        }

        @keyframes counterRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* 4 Arms positions */
        .arm-1 { transform: rotate(0deg); }
        .arm-2 { transform: rotate(90deg); }
        .arm-3 { transform: rotate(180deg); }
        .arm-4 { transform: rotate(270deg); }

        .tiktok { color: #000; }
        .instagram { color: #E1306C; }
        .telegram { color: #0088cc; }
        .message { color: #25D366; }

        /* Theme Switcher */
        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-switch" onclick="toggleTheme()">
        <i id="theme-icon" class="fas fa-moon"></i>
    </div>

    <div class="spinner-wrapper">
        <!-- Center Brand -->
        <div class="brand-center">Tech AI</div>

        <!-- 4 Rotating Arms -->
        <div class="fidget-blades">
            <!-- TikTok -->
            <div class="blade-arm arm-1">
                <a href="https://www.tiktok.com/@_tech_ai_" target="_blank" class="icon-link tiktok"><i class="fab fa-tiktok"></i></a>
            </div>
            <!-- Instagram -->
            <div class="blade-arm arm-2">
                <a href="https://www.instagram.com/falahcanadi" target="_blank" class="icon-link instagram"><i class="fab fa-instagram"></i></a>
            </div>
            <!-- Telegram -->
            <div class="blade-arm arm-3">
                <a href="https://t.me/tech_ai_falah" target="_blank" class="icon-link telegram"><i class="fab fa-telegram"></i></a>
            </div>
            <!-- Message/Contact -->
            <div class="blade-arm arm-4">
                <a href="https://t.me/falahzakho" target="_blank" class="icon-link message"><i class="fas fa-comment-dots"></i></a>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
            }
        }
    </script>
</body>
</html>
