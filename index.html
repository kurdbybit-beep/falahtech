<!DOCTYPE html>
<html lang="ku" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store | Luxury Shopping Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #a855f7; 
            --primary-glow: rgba(168, 85, 247, 0.25);
            --bg-color: #06050a; 
            --text-color: #f8fafc;
            --card-bg: rgba(20, 15, 32, 0.65); 
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(6, 5, 10, 0.85);
            --price-color: #06b6d4; 
            --danger: #ef4444;
        }

        body.light-mode {
            --bg-color: #f1f5f9; 
            --text-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.06);
            --nav-bg: rgba(241, 245, 249, 0.85);
            --price-color: #0891b2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0; padding-bottom: 90px; min-height: 100vh; 
            color: var(--text-color);
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.07), transparent 50%);
            padding-top: 85px;
        }

        .top-nav {
            display: flex; padding: 18px 24px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            justify-content: space-between; align-items: center;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-logo {
            font-weight: 900; font-size: 1.5rem; color: var(--primary); 
            letter-spacing: 1.5px; text-shadow: 0 0 15px var(--primary-glow);
        }

        .nav-actions { display: flex; gap: 10px; align-items: center; }

        .nav-btn {
            cursor: pointer; background: rgba(255,255,255,0.02);
            width: 42px; height: 42px; border-radius: 14px; 
            border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: center; color: var(--text-color);
            font-size: 1.1rem;
        }
        .nav-btn:hover { background: var(--primary); color: #fff; transform: translateY(-2px); box-shadow: 0 5px 12px var(--primary-glow); }
        .theme-toggle { background: rgba(168, 85, 247, 0.1); color: var(--primary); border: 1px solid rgba(168, 85, 247, 0.2); }

        header { padding: 20px 20px 5px; text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 5px; }
        .social-links a { color: var(--text-color); opacity: 0.5; font-size: 1.4rem; text-decoration: none; }
        .social-links a:hover { opacity: 1; color: var(--primary); transform: scale(1.15); }

        .categories-container { 
            position: sticky; top: 79px; z-index: 100; 
            background: var(--nav-bg); backdrop-filter: blur(20px); 
            padding: 12px 15px; overflow-x: auto; display: flex; gap: 10px;
            border-bottom: 1px solid var(--glass-border);
            scrollbar-width: none;
        }
        .categories-container::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            padding: 9px 24px; background: rgba(255,255,255,0.03); border-radius: 14px; 
            cursor: pointer; border: 1px solid var(--glass-border); white-space: nowrap; 
            color: var(--text-color); font-weight: 700; font-size: 0.9rem; opacity: 0.8;
        }
        .cat-btn.active { 
            background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; border: none; 
            font-weight: 900; opacity: 1; box-shadow: 0 6px 15px rgba(168, 85, 247, 0.35); 
        }

        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
            max-width: 700px; 
            margin: 0 auto; 
        }
        
        .product-card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid var(--glass-border); position: relative;
            display: flex; flex-direction: column; padding: 12px; gap: 12px;
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }
        .product-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(168, 85, 247, 0.25);
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.1);
        }

        .product-img { 
            width: 100%; height: 140px; background-size: cover; background-position: center; 
            border-radius: 18px; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
        }
        
        .product-info { 
            display: flex; flex-direction: column; gap: 4px; text-align: right; width: 100%;
        }
        #mainHtml[dir="ltr"] .product-info { text-align: left; }

        .product-title { font-size: 0.95rem; font-weight: 700; margin: 0; line-height: 1.4; color: #fff; min-height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
        body.light-mode .product-title { color: var(--text-color); }
        .product-title:hover { color: var(--primary); }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; width: 100%; }
        .price-tag { color: var(--price-color); font-weight: 900; font-size: 1.05rem; }
        
        .add-btn { 
            background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; border: none; 
            width: 36px; height: 36px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            box-shadow: 0 4px 10px var(--primary-glow);
        }
        .add-btn:hover { transform: scale(1.08); }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(12px); 
            z-index: 3000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            animation: fadeIn 0.3s ease-out; 
        }
        
        .modal-card { 
            background: #130e22; 
            padding: 25px; 
            border-radius: 28px; 
            width: 100%; 
            max-width: 400px; 
            text-align: right; 
            color: var(--text-color); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            position: relative;
            max-height: 85vh; 
            overflow-y: auto;  
            scrollbar-width: none; 
        }
        .modal-card::-webkit-scrollbar { display: none; } 
        
        body.light-mode .modal-card { background: #fff; text-align: right; }
        #mainHtml[dir="ltr"] .modal-card { text-align: left; }
        
        /* ده‌وروبه‌رێ وێنه‌یێ مۆدالێ بۆ پاراستنا پێگه‌هێ سه‌همان */
        .modal-slider-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .modal-img { 
            width: 100%; 
            max-height: 220px; 
            object-fit: contain; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05); 
            background: rgba(0,0,0,0.2); 
        }

        /* ستایلێ سه‌همێن لایێ ڕاست و چه‌پ */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(168, 85, 247, 0.7);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        .slider-arrow:hover { background: var(--primary); transform: translateY(-50%) scale(1.1); }
        .arrow-left { left: 10px; }
        .arrow-right { right: 10px; }

        .modal-desc { font-size: 0.95rem; color: #cbd5e1; line-height: 1.6; margin: 15px 0; white-space: pre-line; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; font-weight: 400; text-align: justify; }
        body.light-mode .modal-desc { color: #334155; border-top-color: rgba(0,0,0,0.08); }

        .m-action-btn {
            width:100%; padding:14px; border:none; border-radius:14px; 
            font-weight:900; cursor:pointer; color:#fff; font-size: 1rem; 
            margin-top: 10px; transition: all 0.2s ease;
        }
        .m-action-btn.add { background: linear-gradient(135deg, var(--primary), #7c3aed); box-shadow: 0 4px 12px var(--primary-glow); }
        .m-action-btn.remove { background: linear-gradient(135deg, var(--danger), #dc2626); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        #cart-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; 
            background: #09070f; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; 
            display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.5);
            border-left: 1px solid var(--glass-border); backdrop-filter: blur(20px);
        }
        body.light-mode #cart-panel { background: #ffffff; }
        #cart-panel.open { right: 0; }
        #mainHtml[dir="ltr"] #cart-panel { right: auto; left: -100%; border-left: none; border-right: 1px solid var(--glass-border); }
        #mainHtml[dir="ltr"] #cart-panel.open { left: 0; }

        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--glass-border); }
        .cart-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 10px; border: none; background: var(--primary); color: #fff; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-text { text-align: center; padding: 40px; font-size: 1.2rem; color: var(--primary); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-logo">TECH AI STORE</div>
    <div class="nav-actions">
        <div class="nav-btn theme-toggle" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-sun"></i></div>
        <div class="nav-btn" onclick="toggleLang()"><span id="lang-label" style="font-weight: 900; font-size: 0.85rem;">KU</span></div>
        <div class="nav-btn" onclick="toggleCart()" style="position: relative;">
            <i class="fas fa-shopping-cart" style="color: var(--primary);"></i>
            <span id="cart-count" style="position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 19px; height: 19px; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 0 8px rgba(239,68,68,0.4);">0</span>
        </div>
    </div>
</div>

<header>
    <div class="social-links">
        <a href="https://www.tiktok.com/@_tech_ai_?" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.instagram.com/__tech_.ai._?" target="_blank"><i class="fab fa-instagram"></i></a>
    </div>
</header>

<div id="details-modal" class="modal">
    <div class="modal-card">
        <span style="position: absolute; top: 15px; left: 15px; cursor: pointer; color: var(--danger); font-size: 1.3rem; z-index: 20;" onclick="closeModal('details-modal')"><i class="fas fa-times-circle"></i></span>
        
        <div class="modal-slider-container">
            <button class="slider-arrow arrow-left" id="prevImageBtn" onclick="changeModalImage(-1)"><i class="fas fa-chevron-left"></i></button>
            <img id="m-img" class="modal-img" src="" alt="Product Image">
            <button class="slider-arrow arrow-right" id="nextImageBtn" onclick="changeModalImage(1)"><i class="fas fa-chevron-right"></i></button>
        </div>

        <h3 id="m-title" style="margin: 0; color: var(--primary); font-weight: 900; font-size: 1.2rem; line-height: 1.4;"></h3>
        <h4 id="m-price" style="margin: 8px 0; color: var(--price-color); font-weight: 900; font-size: 1.15rem;"></h4>
        <div id="m-desc" class="modal-desc"></div>
        <button id="m-add-btn" class="m-action-btn"></button>
    </div>
</div>

<div id="cart-panel">
    <h2 id="t-cart-title" style="color: var(--primary); margin-top: 0; font-weight: 900;">سەلکا من</h2>
    <div id="cart-list" style="flex-grow:1; overflow-y:auto;"></div>
    <div style="padding:20px 0; border-top:1px solid var(--glass-border);">
        <span id="t-total-label">کۆمێ گشتی:</span>
        <h2 style="margin:5px 0; color: var(--price-color); font-weight: 900;"><span id="grand-total">0</span></h2>
    </div>
    <button style="background: rgba(239, 68, 68, 0.08); color: var(--danger); padding: 15px; border-radius: 14px; border:1px solid rgba(239,68,68,0.15); margin-bottom:12px; cursor:pointer; width:100%; font-weight:700;" onclick="clearCart()" id="t-clear-btn">پاککرنا سەلکێ</button>
    <button style="background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; padding: 15px; border-radius: 14px; border:none; cursor:pointer; width:100%; font-weight:900; box-shadow: 0 4px 12px var(--primary-glow);" onclick="toggleCart()" id="t-close-btn">بەردەوام بە</button>
</div>

<div class="categories-container" id="catBar"></div>
<div id="loading" class="loading-text">چاوەڕوانبە... داتا تێنە خویندن</div>
<div id="menuContent" class="products-grid"></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQfog2lyn7MNcui8rGvtOEk7gOzvO3Shny1o6sLEM_jWytc4SeI3Z1-noRlrYdSUDOyorfL57YqWUR/pub?output=csv';
    let dataList = [], cart = {}, currentLang = 'ku';
    let selectedCategory = 'all';
    
    // پاراستنا لیست ئۆف وێنەیێن پۆپئەپێ یا نوکە
    let currentModalImages = [];
    let currentModalImageIndex = 0;

    const translations = {
        ku: { cartTitle: "سەلکا من", total: "کۆمێ گشتی:", clear: "پاککرنا سەلکێ", close: "بەردەوام بە", allCat: "هەمی بەش", addToCartText: "زێدەبکە بۆ سەلکێ", removeFromCartText: "ڕاکرن ژ سەلکێ", noDesc: "چ وەسف یان تێبینی بۆ ڤێ ماددەیێ نینن." },
        en: { cartTitle: "My Cart", total: "Total:", clear: "Clear Cart", close: "Continue", allCat: "All", addToCartText: "Add to Cart", removeFromCartText: "Remove from Cart", noDesc: "No description available." },
        ar: { cartTitle: "سلتي", total: "المجموع:", clear: "تفريغ السلة", close: "استمرار", allCat: "كل الأقسام", addToCartText: "إضافة إلى السلة", removeFromCartText: "إزالة من السلة", noDesc: "لا يوجد وصف متاح." }
    };

    function parseCSV(text) {
        let lines = [];
        let row = [""];
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];

            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row[0] !== '') lines.push(row);
        return lines;
    }

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            
            const parsedLines = parseCSV(txt);
            if (parsedLines.length === 0) return;
            
            const headers = parsedLines[0].map(h => h.trim().toLowerCase());
            
            const idxId = headers.indexOf('id');
            const idxPrice = headers.indexOf('price');
            const idxImg1 = headers.indexOf('image1');
            const idxImg2 = headers.indexOf('image2');
            const idxImg3 = headers.indexOf('image3');
            const idxCat = headers.indexOf('category');
            const idxCatKu = headers.indexOf('cat_ku');
            const idxCatAr = headers.indexOf('cat_ar');
            const idxTitleKu = headers.indexOf('title_ku');
            const idxTitleAr = headers.indexOf('title_ar');
            const idxTitleEn = headers.indexOf('title_en');
            const idxDescKu = headers.indexOf('desc_ku');
            const idxDescAr = headers.indexOf('desc_ar');
            const idxDescEn = headers.indexOf('desc_en');

            const sheetsData = [];

            for (let i = 1; i < parsedLines.length; i++) {
                const row = parsedLines[i];
                if (row.length <= 1 && row[0] === '') continue;

                const catVal = idxCat !== -1 ? row[idxCat] : 'General';
                const titleKuVal = idxTitleKu !== -1 ? row[idxTitleKu] : '';

                if (catVal || titleKuVal) {
                    // کۆمکرنا هەر سێ وێنەیان د ناڤ لیستەکێ دا
                    let imgs = [];
                    if (idxImg1 !== -1 && row[idxImg1]) imgs.push(row[idxImg1].trim());
                    if (idxImg2 !== -1 && row[idxImg2]) imgs.push(row[idxImg2].trim());
                    if (idxImg3 !== -1 && row[idxImg3]) imgs.push(row[idxImg3].trim());
                    if (imgs.length === 0) imgs.push('https://via.placeholder.com/400');

                    sheetsData.push({
                        id: (idxId !== -1 && row[idxId]) ? row[idxId] : 'product-' + i,
                        price: (idxPrice !== -1 && row[idxPrice]) ? row[idxPrice] : '0',
                        img: imgs[0], // وێنەیێ سەرەکی بۆ سەر ڕوکارێ گشتی
                        images: imgs, // هەمی وێنە بۆ مۆدالێ
                        cat: catVal || 'General',
                        cat_ku: (idxCatKu !== -1 && row[idxCatKu]) ? row[idxCatKu] : catVal,
                        cat_ar: (idxCatAr !== -1 && row[idxCatAr]) ? row[idxCatAr] : catVal,
                        name_ku: titleKuVal,
                        name_ar: (idxTitleAr !== -1 && row[idxTitleAr]) ? row[idxTitleAr] : '',
                        name_en: (idxTitleEn !== -1 && row[idxTitleEn]) ? row[idxTitleEn] : titleKuVal,
                        desc_ku: (idxDescKu !== -1 && row[idxDescKu]) ? row[idxDescKu] : '',
                        desc_ar: (idxDescAr !== -1 && row[idxDescAr]) ? row[idxDescAr] : '',
                        desc_en: (idxDescEn !== -1 && row[idxDescEn]) ? row[idxDescEn] : ''
                    });
                }
            }

            dataList = sheetsData;
            document.getElementById('loading').style.display = 'none';
            renderMenu();
            updateUIStrings();
        } catch (e) { 
            console.error(e); 
            document.getElementById('loading').innerText = "کێشەیەک د خویندنا داتایان دا هەیە.";
        }
    }

    function updateUIStrings() {
        const t = translations[currentLang];
        document.getElementById('t-cart-title').innerText = t.cartTitle;
        document.getElementById('t-total-label').innerText = t.total;
        document.getElementById('t-clear-btn').innerText = t.clear;
        document.getElementById('t-close-btn').innerText = t.close;
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        catBar.innerHTML = ''; menuContent.innerHTML = '';
        if (dataList.length === 0) return;

        const allBtn = document.createElement('div');
        allBtn.className = `cat-btn ${selectedCategory === 'all' ? 'active' : ''}`;
        allBtn.innerText = translations[currentLang].allCat;
        allBtn.onclick = () => { selectedCategory = 'all'; renderMenu(); };
        catBar.appendChild(allBtn);

        const uniqueCats = [...new Set(dataList.map(i => i.cat))].filter(c => c);
        uniqueCats.forEach(cat => {
            const sample = dataList.find(i => i.cat === cat);
            let catName = cat;
            if(sample) { catName = currentLang === 'ku' ? sample.cat_ku : (currentLang === 'ar' ? sample.cat_ar : cat); }
            const btn = document.createElement('div');
            btn.className = `cat-btn ${selectedCategory === cat ? 'active' : ''}`;
            btn.innerText = catName;
            btn.onclick = () => { selectedCategory = cat; renderMenu(); };
            catBar.appendChild(btn);
        });

        const filteredItems = selectedCategory === 'all' ? dataList : dataList.filter(i => i.cat === selectedCategory);

        filteredItems.forEach(product => {
            const name = currentLang === 'ku' ? product.name_ku : (currentLang === 'ar' ? product.name_ar : product.name_en);
            const desc = currentLang === 'ku' ? product.desc_ku : (currentLang === 'ar' ? product.desc_ar : product.desc_en);
            
            menuContent.innerHTML += `
                <div class="product-card">
                    <div class="product-img" style="background-image: url('${product.img}')" onclick="openDetails('${product.id}')"></div>
                    <div class="product-info">
                        <h3 class="product-title" onclick="openDetails('${product.id}')">${name}</h3>
                        <div class="card-bottom">
                            <span class="price-tag">${product.price}</span>
                            <button class="add-btn" onclick="addToCart('${product.id}')"><i class="fas fa-cart-plus"></i></button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openDetails(id) {
        const product = dataList.find(i => i.id === id);
        if (!product) return;

        const name = currentLang === 'ku' ? product.name_ku : (currentLang === 'ar' ? product.name_ar : product.name_en);
        const desc = currentLang === 'ku' ? product.desc_ku : (currentLang === 'ar' ? product.desc_ar : product.desc_en);

        // ڕێکخستنا سیستمێ وێنەیان
        currentModalImages = product.images || [product.img];
        currentModalImageIndex = 0;
        document.getElementById('m-img').src = currentModalImages[currentModalImageIndex];

        // شاردنەوە یان نیشاندانا سەهمان ل سەر بنەمایێ ژمارەیا وێنەیان
        if (currentModalImages.length > 1) {
            document.getElementById('prevImageBtn').style.display = 'flex';
            document.getElementById('nextImageBtn').style.display = 'flex';
        } else {
            document.getElementById('prevImageBtn').style.display = 'none';
            document.getElementById('nextImageBtn').style.display = 'none';
        }

        document.getElementById('m-title').innerText = name;
        document.getElementById('m-price').innerText = product.price;
        
        if (desc && desc.trim() !== '') {
            document.getElementById('m-desc').innerText = desc;
        } else {
            document.getElementById('m-desc').innerText = translations[currentLang].noDesc;
        }
        
        updateModalButton(id);
        
        document.getElementById('details-modal').style.display = 'flex';
        document.querySelector('.modal-card').scrollTop = 0;
    }

    // فەنکشنا گۆڕینا وێنەی ب سەهمان
    function changeModalImage(direction) {
        if (currentModalImages.length <= 1) return;
        
        currentModalImageIndex += direction;
        
        // ئەگەر گەهشتە کۆتاییێ دێ زڤریتە سەرەتا، یان بەڕەڤاژە
        if (currentModalImageIndex >= currentModalImages.length) currentModalImageIndex = 0;
        if (currentModalImageIndex < 0) currentModalImageIndex = currentModalImages.length - 1;
        
        document.getElementById('m-img').src = currentModalImages[currentModalImageIndex];
    }

    function updateModalButton(id) {
        const addBtn = document.getElementById('m-add-btn');
        if (cart[id]) {
            addBtn.innerText = translations[currentLang].removeFromCartText;
            addBtn.className = "m-action-btn remove";
            addBtn.onclick = () => { removeFromCartComplete(id); };
        } else {
            addBtn.innerText = translations[currentLang].addToCartText;
            addBtn.className = "m-action-btn add";
            addBtn.onclick = () => { addToCart(id); updateModalButton(id); };
        }
    }

    function addToCart(id) {
        const item = dataList.find(i => i.id === id);
        if(!item) return;
        if(cart[id]) cart[id].qty++;
        else cart[id] = {...item, qty: 1};
        updateCartUI();
    }

    function removeFromCartComplete(id) {
        if(cart[id]) {
            delete cart[id];
            updateCartUI();
            updateModalButton(id);
        }
    }

    function updateCartUI() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        let totalItems = 0, grandTotal = 0;
        Object.values(cart).forEach(item => {
            totalItems += item.qty;
            let priceNum = parseInt(item.price.replace(/,/g, '').replace(/[^\d]/g, '')) || 0;
            grandTotal += (priceNum * item.qty);
            const name = currentLang === 'ku' ? item.name_ku : (currentLang === 'ar' ? item.name_ar : item.name_en);
            list.innerHTML += `<div class="cart-item">
                <div style="flex-grow:1;"><b>${name}</b><br><small style="color:var(--price-color); font-weight:700;">${item.price}</small></div>
                <div class="cart-controls">
                    <button class="qty-btn" onclick="changeQty('${item.id}',-1)">-</button>
                    <span style="font-weight:700;">${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
                </div>
            </div>`;
        });
        document.getElementById('cart-count').innerText = totalItems;
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString() + " IQD";
    }

    function changeQty(id, d) {
        cart[id].qty += d;
        if(cart[id].qty <= 0) delete cart[id];
        updateCartUI();
        if(document.getElementById('details-modal').style.display === 'flex') {
            updateModalButton(id);
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'ku' ? 'en' : (currentLang === 'en' ? 'ar' : 'ku');
        document.getElementById('lang-label').innerText = currentLang.toUpperCase();
        document.getElementById('mainHtml').dir = currentLang === 'en' ? 'ltr' : 'rtl';
        updateUIStrings();
        renderMenu();
        updateCartUI();
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('theme-icon').className = document.body.classList.contains('light-mode') ? 'fas fa-moon' : 'fas fa-sun';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }
    function clearCart() { cart = {}; updateCartUI(); }

    window.onload = loadData;
</script>
</body>
</html>
