<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECH AI | Image Engineer Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-gray: #b3b3b3;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--neon-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.6;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--card-bg);
            border-right: 4px solid var(--neon-cyan);
        }

        .result-image {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #333;
        }

        /* Input Area */
        .input-wrapper {
            background: #111;
            padding: 20px;
            border-top: 1px solid #222;
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #prompt-input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        #prompt-input:focus {
            border-color: var(--neon-cyan);
        }

        .btn-action {
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-upload {
            background: #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Loading Animation */
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <header>
        <div class="logo">TECH AI STUDIO</div>
        <div style="font-size: 0.8rem; color: var(--text-gray);">Image Engineer Mode</div>
    </header>

    <div class="chat-container" id="chatBox">
        <!-- دەستپێکا چاتی -->
        <div class="message ai-msg">
            بخێر بێی فەلاح! وێنەیەکێ بارکە و پڕۆمپتێ خۆ بنڤیسە دا ئەز ب زیرەکیا دەستکرد بۆ تە بگوھۆڕم.
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <!-- پیشاندانا وێنەیێ هاتیە هەلبژارتن -->
            <div id="file-name" style="font-size: 0.8rem; color: var(--neon-cyan);"></div>
            
            <div class="controls">
                <label class="btn-upload" title="Upload Image">
                    <i class="fas fa-image"></i>
                    <input type="file" id="imageInput" hidden accept="image/*">
                </label>
                
                <input type="text" id="prompt-input" placeholder="پڕۆمپتێ خۆ لێرە بنڤیسە (بۆ نموونە: Line art style...)">
                
                <button class="btn-action" onclick="generateImage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <center><div class="loader" id="loader"></div></center>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('file-name');
        const chatBox = document.getElementById('chatBox');
        const loader = document.getElementById('loader');

        imageInput.addEventListener('change', function() {
            if(this.files[0]) {
                fileNameDisplay.innerText = "وێنە هاتە هەلبژارتن: " + this.files[0].name;
            }
        });

        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            if(!prompt) {
                alert("تکایە پڕۆمپتەکێ بنڤیسە!");
                return;
            }

            loader.style.display = "block";

            // لێرە تو پێدڤی ب بەشێ (Backend/API) هەی دا کار بکەت
            // ئەڤە تەنێ لاساییکردنەوەیا (Simulation) کارێ AI یە:
            setTimeout(() => {
                const aiResponse = document.createElement('div');
                aiResponse.className = 'message ai-msg';
                aiResponse.innerHTML = `
                    <b>ئەنجامێ دیزاینێ تە:</b><br>
                    <i>Prompt: ${prompt}</i><br>
                    <img src="https://via.placeholder.com/600x400/1a1a1a/00f2ff?text=AI+Generated+Image" class="result-image">
                `;
                chatBox.appendChild(aiResponse);
                loader.style.display = "none";
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 3000);
        }
    </script>
</body>
</html>
